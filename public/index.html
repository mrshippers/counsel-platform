<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counsel — Case Management</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--void:#06090F;--deep:#0B1120;--base:#0F172A;--raised:#141E35;--surface:#192440;
--gold:#C9A96E;--goldLight:#DBBF8A;--goldPale:#E8D5AB;--goldGlow:rgba(201,169,110,0.08);--goldGlowStrong:rgba(201,169,110,0.18);
--blue:#5B8DEF;--blueDim:rgba(91,141,239,0.1);
--text:#E8E2D6;--textSec:#9BA4B8;--textMut:#5C6680;
--success:#5CB87A;--successDim:rgba(92,184,122,0.08);
--warning:#E2B04A;--warningDim:rgba(226,176,74,0.08);
--danger:#E05555;--dangerDim:rgba(224,85,85,0.08);
--glass:rgba(15,23,42,0.55);--glassBorder:rgba(201,169,110,0.07);
--r:14px;--rLg:20px;--rSm:8px;
}
body{font-family:'Outfit',sans-serif;background:var(--void);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
*::-webkit-scrollbar{width:5px}*::-webkit-scrollbar-track{background:transparent}*::-webkit-scrollbar-thumb{background:rgba(201,169,110,0.15);border-radius:10px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes meshDrift{0%{transform:translate(0,0)}50%{transform:translate(-20px,15px)}100%{transform:translate(10px,-10px)}}

.bg-atmosphere{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-mesh{position:absolute;inset:-50%;width:200%;height:200%;background:radial-gradient(ellipse 600px 400px at 20% 20%,rgba(201,169,110,0.06) 0%,transparent 60%),radial-gradient(ellipse 400px 500px at 80% 30%,rgba(91,141,239,0.03) 0%,transparent 50%),radial-gradient(ellipse 350px 500px at 50% 80%,rgba(201,169,110,0.04) 0%,transparent 55%);animation:meshDrift 40s ease-in-out infinite alternate}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px)}
.bg-orb-1{width:350px;height:350px;background:radial-gradient(circle,rgba(201,169,110,0.1),transparent 70%);top:-5%;left:5%}
.bg-orb-2{width:280px;height:280px;background:radial-gradient(circle,rgba(91,141,239,0.05),transparent 70%);bottom:5%;right:8%}
.bg-noise{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:200px}

.glass{background:var(--glass);backdrop-filter:blur(30px) saturate(1.4);-webkit-backdrop-filter:blur(30px) saturate(1.4);border:1px solid var(--glassBorder);border-radius:var(--rLg);padding:22px;box-shadow:0 2px 24px rgba(0,0,0,0.3);transition:all .3s ease}
.glass:hover{border-color:var(--goldGlowStrong)}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative;z-index:1}
.login-card{width:100%;max-width:420px;padding:40px}
.login-card h1{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:var(--gold);letter-spacing:-0.03em;margin-bottom:4px}
.login-card h1 .dot{display:inline-block;width:5px;height:5px;background:var(--gold);border-radius:50%;margin-left:2px;margin-bottom:4px;opacity:.6}
.login-card p{color:var(--textMut);font-size:13px;margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--textMut);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.form-group input{width:100%;padding:10px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--glassBorder);border-radius:var(--rSm);color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:border .2s}
.form-group input:focus{border-color:var(--gold)}
.btn-gold{width:100%;padding:11px;background:linear-gradient(135deg,var(--gold),#B89858);border:1px solid var(--gold);border-radius:var(--rSm);color:var(--void);font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;box-shadow:0 2px 16px rgba(201,169,110,0.15);transition:all .3s;margin-top:8px}
.btn-gold:hover{box-shadow:0 4px 24px rgba(201,169,110,0.25)}
.btn-gold:disabled{opacity:.5;cursor:not-allowed}
.login-error{color:var(--danger);font-size:12px;margin-top:12px;text-align:center}

/* LAYOUT */
#app{display:none;position:relative;z-index:1}
.layout{display:flex;min-height:100vh}
.sidebar{width:250px;background:var(--glass);backdrop-filter:blur(40px) saturate(1.4);border-right:1px solid var(--glassBorder);padding:18px 10px;display:flex;flex-direction:column;gap:2px;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:4px 14px 18px;display:flex;align-items:baseline}
.sidebar-logo span{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--gold);letter-spacing:-0.03em}
.sidebar-logo .dot{width:4px;height:4px;background:var(--gold);border-radius:50%;margin-left:2px;opacity:.6;display:inline-block}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--rSm);cursor:pointer;transition:all .25s;font-size:13px;color:var(--textMut);border-left:2px solid transparent}
.nav-item:hover{color:var(--textSec);background:rgba(201,169,110,0.03)}
.nav-item.active{color:var(--goldLight);background:var(--goldGlow);border-left-color:var(--gold);font-weight:500}
.nav-item .icon{font-size:15px;opacity:.5;width:20px;text-align:center}
.nav-item.active .icon{opacity:.9}
.nav-badge{margin-left:auto;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--goldGlow);color:var(--gold)}
.firm-card{margin-top:auto;padding:14px 14px 0;border-top:1px solid var(--glassBorder)}
.firm-card-inner{padding:12px 14px;border-radius:var(--r);background:linear-gradient(135deg,var(--goldGlow),transparent);border:1px solid rgba(201,169,110,0.06)}
.firm-card-name{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--goldLight)}
.firm-card-meta{font-size:10.5px;color:var(--textMut);margin-top:2px}
.logout-btn{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--rSm);cursor:pointer;font-size:12px;color:var(--textMut);border:none;background:none;font-family:'Outfit',sans-serif;width:100%;margin-top:8px;transition:color .2s}
.logout-btn:hover{color:var(--danger)}

.main{flex:1;padding:24px 28px;overflow-y:auto;display:flex;flex-direction:column;gap:20px}

/* TOP BAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;animation:rise .5s ease both}
.top-bar .date{font-size:12.5px;color:var(--textMut);margin-bottom:4px}
.top-bar h1{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:500;letter-spacing:-0.02em;line-height:1.1}
.top-bar h1 .name{color:var(--gold)}
.top-actions{display:flex;gap:8px}
.btn-outline{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rSm);background:rgba(15,23,42,0.3);border:1px solid var(--glassBorder);color:var(--textSec);font-size:12.5px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .3s}
.btn-outline:hover{border-color:var(--goldGlowStrong)}

/* TRIAGE CARDS */
.triage-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;animation:rise .5s ease .06s both}
.alert-card{padding:16px 18px;display:flex;align-items:center;gap:14px}
.alert-icon{width:42px;height:42px;border-radius:var(--rSm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.alert-count{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:500;color:var(--text);line-height:1}
.alert-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.alert-detail{font-size:11.5px;color:var(--textMut);margin-top:4px}

/* MAIN GRID */
.main-grid{display:grid;grid-template-columns:1fr 380px;gap:18px;animation:rise .5s ease .12s both}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-header span{font-size:14px;font-weight:600;color:var(--text)}
.section-header .action{font-size:11px;color:var(--gold);cursor:pointer;opacity:.7;padding:4px 10px;border-radius:var(--rSm)}

/* CASES TABLE */
.cases-table{width:100%;border-collapse:collapse}
.cases-table th{text-align:left;font-size:10px;font-weight:600;color:var(--textMut);text-transform:uppercase;letter-spacing:.1em;padding:0 10px 12px;border-bottom:1px solid var(--glassBorder)}
.cases-table td{padding:11px 10px;font-size:12.5px;color:var(--textSec)}
.cases-table tr{cursor:pointer;transition:all .2s;border-left:2px solid transparent}
.cases-table tr:hover{background:var(--goldGlow)}
.cases-table tr.bleeding{background:var(--dangerDim);border-left-color:var(--danger)}
.cases-table tr.stalled{background:var(--warningDim);border-left-color:var(--warning)}
.case-ref{font-size:12px;font-weight:600;color:var(--text);font-family:'Outfit',monospace;letter-spacing:.02em}
.lawyer-avatar{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:10px;font-weight:600;background:linear-gradient(135deg,var(--raised),var(--surface));border:1px solid var(--glassBorder);color:var(--goldLight)}

/* STATUS PILLS */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.02em}
.pill .dot{width:5px;height:5px;border-radius:50%}
.pill-active{background:var(--successDim);color:var(--success)}.pill-active .dot{background:var(--success)}
.pill-urgent{background:var(--dangerDim);color:var(--danger)}.pill-urgent .dot{background:var(--danger);box-shadow:0 0 6px rgba(224,85,85,0.3);animation:pulse 2s ease-in-out infinite}
.pill-in_progress{background:var(--goldGlow);color:var(--gold)}.pill-in_progress .dot{background:var(--gold)}
.pill-pending{background:var(--blueDim);color:var(--blue)}.pill-pending .dot{background:var(--blue)}
.pill-completed{background:var(--successDim);color:var(--success)}.pill-completed .dot{background:var(--success)}

/* PROGRESS BAR */
.progress-wrap{height:4px;background:rgba(255,255,255,0.04);border-radius:10px;overflow:hidden;flex:1}
.progress-fill{height:100%;border-radius:10px;transition:width .6s ease}
.progress-container{display:flex;align-items:center;gap:8px;min-width:100px}
.progress-text{font-size:11px;color:var(--textMut);font-weight:500;min-width:30px}

/* RIGHT COLUMN */
.right-col{display:flex;flex-direction:column;gap:18px}

/* LAWYER CARD */
.lawyer-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r);background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.015);transition:all .3s}
.lawyer-row.overloaded{background:var(--warningDim);border-color:rgba(226,176,74,0.1)}
.lawyer-avatar-lg{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--raised),var(--surface));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--goldLight);border:1.5px solid var(--glassBorder);flex-shrink:0}
.lawyer-row.overloaded .lawyer-avatar-lg{border-color:var(--warning)}
.lawyer-name{font-size:13px;font-weight:500;color:var(--text)}
.lawyer-stats{display:flex;gap:10px;margin-top:4px}
.lawyer-stats span{font-size:10.5px;color:var(--textMut)}
.lawyer-stats .urgent{color:var(--danger)}
.high-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:6px;background:var(--warningDim);color:var(--warning);margin-left:6px}

/* DEADLINE CARD */
.deadline-row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--r);background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.015);cursor:pointer;transition:all .3s}
.deadline-row:hover{border-color:var(--glassBorder)}
.deadline-date{width:42px;height:42px;border-radius:var(--rSm);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.deadline-date .day{font-size:16px;font-weight:700;color:var(--text);line-height:1}
.deadline-date .mon{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--textSec);margin-top:1px}
.deadline-date.critical{background:var(--dangerDim);border:1px solid rgba(224,85,85,0.12)}
.deadline-date.high{background:var(--goldGlowStrong);border:1px solid rgba(201,169,110,0.1)}
.deadline-date.normal{background:var(--blueDim);border:1px solid rgba(91,141,239,0.08)}
.deadline-title{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.deadline-meta{font-size:10.5px;color:var(--textMut);margin-top:2px}
.days-pill{font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px;flex-shrink:0}
.days-pill.critical{background:var(--dangerDim);color:var(--danger)}
.days-pill.high{background:var(--warningDim);color:var(--warning)}
.days-pill.normal{background:var(--blueDim);color:var(--blue)}

/* LEGEND */
.legend{display:flex;gap:16px;margin-top:14px;padding-top:12px;border-top:1px solid var(--glassBorder)}
.legend span{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--textMut)}
.legend .mark{width:8px;height:3px;border-radius:2px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{width:100%;max-width:560px;max-height:85vh;overflow-y:auto;padding:28px}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--text);margin-bottom:20px}
.modal .close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--textMut);font-size:20px;cursor:pointer}
.task-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.task-item input[type=checkbox]{accent-color:var(--gold);width:16px;height:16px;cursor:pointer}
.task-item label{font-size:13px;color:var(--textSec);cursor:pointer;flex:1}
.task-item.done label{text-decoration:line-through;opacity:.5}
.case-detail-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.case-detail-header .pill{font-size:10px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--textMut);font-size:13px}
</style>
</head>
<body>

<div class="bg-atmosphere"><div class="bg-mesh"></div><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div></div>
<div class="bg-noise"></div>

<!-- LOGIN -->
<div id="login-screen">
<div class="glass login-card">
  <h1>Counsel<span class="dot"></span></h1>
  <p>Case management for UK law firms</p>
  <form id="login-form">
    <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="you@firm.co.uk" required></div>
    <div class="form-group"><label>Password</label><input type="password" id="login-pass" placeholder="Enter password" required></div>
    <button type="submit" class="btn-gold" id="login-btn">Sign in</button>
    <div class="login-error" id="login-error"></div>
  </form>
</div>
</div>

<!-- APP -->
<div id="app">
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main-content"></main>
</div>
</div>

<!-- CASE DETAIL MODAL -->
<div class="modal-overlay" id="case-modal">
<div class="glass modal" id="case-modal-content" style="position:relative"></div>
</div>

<!-- NEW CASE MODAL -->
<div class="modal-overlay" id="new-case-modal">
<div class="glass modal" id="new-case-content" style="position:relative"></div>
</div>

<script>
const API = '';
let token = localStorage.getItem('counsel_token');
let user = JSON.parse(localStorage.getItem('counsel_user') || 'null');

// API helper
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API}${path}`, opts);
  const data = await res.json().catch(() => ({}));
  if (res.status === 401 && path !== '/api/auth/login') { logout(); return null; }
  return { status: res.status, data };
}

// Months
const MONTHS = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Status pill
function statusPill(status) {
  const labels = { pending:'Pending', in_progress:'In Progress', completed:'Done', active:'Active', urgent:'Urgent' };
  const s = status === 'in_progress' ? 'in_progress' : status;
  return `<span class="pill pill-${s}"><span class="dot"></span>${labels[s] || s}</span>`;
}

// Progress bar
function progressBar(val) {
  const color = val === 100 ? 'var(--success)' : val >= 50 ? 'var(--gold)' : 'var(--blue)';
  return `<div class="progress-container"><div class="progress-wrap"><div class="progress-fill" style="width:${val}%;background:${color}"></div></div><span class="progress-text">${val}%</span></div>`;
}

// Date formatting
function fmtDate(d) { if(!d)return'TBC'; const p=d.split('-'); return `${parseInt(p[2])} ${MONTHS[parseInt(p[1])]}`; }
function daysUntil(d) { if(!d)return 999; return Math.ceil((new Date(d)-new Date())/(86400000)); }
function urgency(days) { return days <= 3 ? 'critical' : days <= 7 ? 'high' : 'normal'; }

// INIT
function init() {
  if (token && user) { showApp(); } else { showLogin(); }
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderSidebar();
  loadDashboard();
}

// LOGIN
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  btn.disabled = true; btn.textContent = 'Signing in...'; err.textContent = '';
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-pass').value;
  const res = await api('POST', '/api/auth/login', { email, password });
  btn.disabled = false; btn.textContent = 'Sign in';
  if (res.status === 200) {
    token = res.data.access_token; user = res.data.user;
    localStorage.setItem('counsel_token', token);
    localStorage.setItem('counsel_user', JSON.stringify(user));
    showApp();
  } else {
    err.textContent = res.data.error || 'Login failed';
  }
});

function logout() {
  api('POST', '/api/auth/logout').catch(()=>{});
  token = null; user = null;
  localStorage.removeItem('counsel_token'); localStorage.removeItem('counsel_user');
  showLogin();
}

// SIDEBAR
function renderSidebar() {
  const items = [
    { id:'dashboard', icon:'\u25AB', label:'Dashboard' },
    { id:'cases', icon:'\uD83D\uDCC1', label:'Cases' },
    { id:'clients', icon:'\uD83D\uDC64', label:'Clients' },
    { id:'documents', icon:'\uD83D\uDCC4', label:'Documents' },
    { id:'calendar', icon:'\uD83D\uDCC5', label:'Calendar' },
    { id:'deadlines', icon:'\u23F1', label:'Deadlines' },
    { id:'lawyers', icon:'\u2696', label:'Lawyers' },
  ];
  const nav = items.map(i =>
    `<div class="nav-item ${i.id==='dashboard'?'active':''}" data-view="${i.id}"><span class="icon">${i.icon}</span>${i.label}</div>`
  ).join('');
  document.getElementById('sidebar').innerHTML = `
    <div class="sidebar-logo"><span>Counsel</span><span class="dot"></span></div>
    ${nav}
    <div class="firm-card"><div class="firm-card-inner">
      <div class="firm-card-name">Townsend &amp; Associates</div>
      <div class="firm-card-meta">Professional · 3 seats</div>
    </div></div>
    <button class="logout-btn" onclick="logout()">← Sign out</button>
  `;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
      const view = el.dataset.view;
      if (view === 'dashboard') loadDashboard();
      else if (view === 'cases') loadCases();
      else document.getElementById('main-content').innerHTML = `<div class="loading">${el.textContent} — coming soon</div>`;
    });
  });
}

// DASHBOARD
async function loadDashboard() {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading">Loading dashboard...</div>';

  const [dashRes, casesRes, deadlinesRes] = await Promise.all([
    api('GET', '/api/dashboard'),
    api('GET', '/api/cases'),
    api('GET', '/api/deadlines/upcoming'),
  ]);

  if (!dashRes || !casesRes) return;
  const dash = dashRes.data;
  const cases = casesRes.data.data || [];
  const deadlines = deadlinesRes?.data?.data || [];
  const lawyers = dash.lawyers || [];
  const triage = dash.triage || {};

  const now = new Date();
  const greeting = now.getHours() < 12 ? 'Good morning' : now.getHours() < 18 ? 'Good afternoon' : 'Good evening';
  const dateStr = now.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  const firstName = user?.name?.split(' ')[0] || 'Partner';

  main.innerHTML = `
    <div class="top-bar">
      <div>
        <div class="date">${dateStr}</div>
        <h1>${greeting}, <span class="name">${firstName}</span></h1>
      </div>
      <div class="top-actions">
        <button class="btn-outline" onclick="openNewCase()">+ New Case</button>
      </div>
    </div>

    <div class="triage-grid">
      ${triageCard('\uD83D\uDD25', triage.bleeding||0, 'Bleeding', 'Deadline <48hrs, tasks incomplete', 'var(--danger)', 'var(--dangerDim)')}
      ${triageCard('\u23F8', triage.stalled||0, 'Stalled', 'No activity in 7+ days', 'var(--warning)', 'var(--warningDim)')}
      ${triageCard('\u26A0\uFE0F', lawyers.filter(l=>l.workload?.active_cases>=8).length||0, 'Overloaded', '8+ active cases assigned', 'var(--warning)', 'var(--warningDim)')}
      ${triageCard('\uD83D\uDCCA', triage.total_active||0, 'Active', 'Across all practice areas', 'var(--gold)', 'var(--goldGlow)')}
    </div>

    <div class="main-grid">
      <div class="glass">
        <div class="section-header"><span>Active Cases — Triage View</span></div>
        <div style="overflow-x:auto">
          <table class="cases-table">
            <thead><tr>
              <th>Title</th><th>Client</th><th>Type</th><th>Lawyer</th><th>Progress</th><th>Status</th><th>Deadline</th>
            </tr></thead>
            <tbody>
              ${cases.filter(c=>c.status!=='completed').map(c => {
                const days = daysUntil(c.deadline);
                const isBleeding = c.deadline && days <= 2 && c.progress < 100;
                const isStalled = false; // would need updated_at diff
                return `<tr class="${isBleeding?'bleeding':isStalled?'stalled':''}" onclick="openCase('${c.id}')">
                  <td class="case-ref">${c.title}</td>
                  <td>${c.clients?.name || '—'}</td>
                  <td style="font-size:11.5px;color:var(--textMut)">${c.type}</td>
                  <td><span class="lawyer-avatar">${c.users?.avatar_initials || '??'}</span></td>
                  <td>${progressBar(c.progress)}</td>
                  <td>${statusPill(c.status)}</td>
                  <td style="font-size:11.5px;color:var(--textMut)">${fmtDate(c.deadline)}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
        <div class="legend">
          <span><span class="mark" style="background:var(--danger)"></span>Bleeding</span>
          <span><span class="mark" style="background:var(--warning)"></span>Stalled 7d+</span>
        </div>
      </div>

      <div class="right-col">
        <div class="glass">
          <div class="section-header"><span>Team Workload</span></div>
          <div style="display:flex;flex-direction:column;gap:10px">
            ${lawyers.map(l => {
              const wl = l.workload || { active_cases:0, urgent_cases:0 };
              const over = wl.active_cases >= 8;
              return `<div class="lawyer-row ${over?'overloaded':''}">
                <div class="lawyer-avatar-lg">${l.avatar_initials || '??'}</div>
                <div style="flex:1;min-width:0">
                  <div class="lawyer-name">${l.name}${over?'<span class="high-badge">HIGH</span>':''}</div>
                  <div class="lawyer-stats">
                    <span>${wl.active_cases} active</span>
                    ${wl.urgent_cases?`<span class="urgent">${wl.urgent_cases} urgent</span>`:''}
                  </div>
                </div>
                <div style="width:50px">${progressBar(Math.min(wl.active_cases/10*100,100))}</div>
              </div>`;
            }).join('') || '<div style="color:var(--textMut);font-size:12px;padding:12px">No team members yet</div>'}
          </div>
        </div>

        <div class="glass">
          <div class="section-header"><span>Upcoming Deadlines</span></div>
          <div style="display:flex;flex-direction:column;gap:8px">
            ${deadlines.slice(0,4).map(d => {
              const days = daysUntil(d.date);
              const urg = urgency(days);
              const parts = d.date.split('-');
              return `<div class="deadline-row">
                <div class="deadline-date ${urg}">
                  <span class="day">${parseInt(parts[2])}</span>
                  <span class="mon">${MONTHS[parseInt(parts[1])]}</span>
                </div>
                <div style="flex:1;min-width:0">
                  <div class="deadline-title">${d.title}</div>
                  <div class="deadline-meta">${d.cases?.title || ''}</div>
                </div>
                <span class="days-pill ${urg}">${days}d</span>
              </div>`;
            }).join('') || '<div style="color:var(--textMut);font-size:12px;padding:12px">No upcoming deadlines</div>'}
          </div>
        </div>
      </div>
    </div>
  `;
}

function triageCard(icon, count, label, detail, color, bg) {
  return `<div class="glass alert-card">
    <div class="alert-icon" style="background:${bg}">${icon}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:baseline;gap:8px">
        <span class="alert-count">${count}</span>
        <span class="alert-label" style="color:${color}">${label}</span>
      </div>
      <div class="alert-detail">${detail}</div>
    </div>
  </div>`;
}

// CASE DETAIL
async function openCase(id) {
  const modal = document.getElementById('case-modal');
  const content = document.getElementById('case-modal-content');
  content.innerHTML = '<div class="loading">Loading...</div>';
  modal.classList.add('open');

  const res = await api('GET', `/api/cases/${id}`);
  if (!res || !res.data?.data) { modal.classList.remove('open'); return; }
  const c = res.data.data;
  const tasks = c.tasks || [];

  content.innerHTML = `
    <button class="close" onclick="document.getElementById('case-modal').classList.remove('open')">&times;</button>
    <div class="case-detail-header">
      ${statusPill(c.status)}
      <span style="font-size:11px;color:var(--textMut)">${c.type} · ${fmtDate(c.deadline)}</span>
    </div>
    <h2>${c.title}</h2>
    <div style="font-size:13px;color:var(--textSec);margin-bottom:6px">Client: ${c.clients?.name || '—'} · Lawyer: ${c.users?.name || '—'}</div>
    <div style="margin:16px 0">${progressBar(c.progress)}</div>
    <div style="font-size:12px;font-weight:600;color:var(--textMut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Tasks</div>
    <div id="task-list">
      ${tasks.sort((a,b)=>a.order_index-b.order_index).map(t => `
        <div class="task-item ${t.done?'done':''}">
          <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}',this.checked,'${id}')">
          <label>${t.label}</label>
        </div>
      `).join('')}
    </div>
    ${c.notes ? `<div style="margin-top:16px;font-size:12px;color:var(--textMut)">Notes: ${c.notes}</div>` : ''}
  `;
}

async function toggleTask(taskId, done, caseId) {
  const res = await api('PATCH', `/api/tasks/${taskId}`, { done });
  if (res?.data) {
    // Re-open case to refresh
    openCase(caseId);
  }
}

// NEW CASE
async function openNewCase() {
  const modal = document.getElementById('new-case-modal');
  const content = document.getElementById('new-case-content');
  content.innerHTML = '<div class="loading">Loading...</div>';
  modal.classList.add('open');

  const clientsRes = await api('GET', '/api/clients');
  const clients = clientsRes?.data?.data || [];

  content.innerHTML = `
    <button class="close" onclick="document.getElementById('new-case-modal').classList.remove('open')">&times;</button>
    <h2>New Case</h2>
    <form id="new-case-form">
      <div class="form-group"><label>Title</label><input type="text" id="nc-title" required placeholder="e.g. Commercial Lease Agreement"></div>
      <div class="form-group"><label>Client</label>
        <select id="nc-client" style="width:100%;padding:10px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--glassBorder);border-radius:var(--rSm);color:var(--text);font-family:'Outfit',sans-serif;font-size:14px">
          ${clients.map(cl => `<option value="${cl.id}">${cl.name}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label>Type</label>
        <select id="nc-type" style="width:100%;padding:10px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--glassBorder);border-radius:var(--rSm);color:var(--text);font-family:'Outfit',sans-serif;font-size:14px">
          <option value="corporate">Corporate</option><option value="criminal">Criminal</option><option value="family">Family</option>
          <option value="civil">Civil</option><option value="real_estate">Real Estate</option><option value="employment">Employment</option><option value="other">Other</option>
        </select>
      </div>
      <div class="form-group"><label>Priority</label>
        <select id="nc-priority" style="width:100%;padding:10px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--glassBorder);border-radius:var(--rSm);color:var(--text);font-family:'Outfit',sans-serif;font-size:14px">
          <option value="normal">Normal</option><option value="high">High</option><option value="urgent">Urgent</option>
        </select>
      </div>
      <div class="form-group"><label>Deadline</label><input type="date" id="nc-deadline" style="color-scheme:dark"></div>
      <button type="submit" class="btn-gold">Create Case</button>
      <div class="login-error" id="nc-error"></div>
    </form>
  `;

  document.getElementById('new-case-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const res = await api('POST', '/api/cases', {
      title: document.getElementById('nc-title').value,
      client_id: document.getElementById('nc-client').value,
      lawyer_id: user.id,
      type: document.getElementById('nc-type').value,
      priority: document.getElementById('nc-priority').value,
      deadline: document.getElementById('nc-deadline').value || undefined,
    });
    if (res.status === 201) {
      document.getElementById('new-case-modal').classList.remove('open');
      loadDashboard();
    } else {
      document.getElementById('nc-error').textContent = res.data?.error || 'Failed to create case';
    }
  });
}

// CASES LIST VIEW
async function loadCases() {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading">Loading cases...</div>';
  const res = await api('GET', '/api/cases');
  if (!res) return;
  const cases = res.data.data || [];
  main.innerHTML = `
    <div class="top-bar">
      <h1 style="font-family:'Cormorant Garamond',serif;font-size:26px">All Cases</h1>
      <div class="top-actions"><button class="btn-gold" style="width:auto" onclick="openNewCase()">+ New Case</button></div>
    </div>
    <div class="glass">
      <table class="cases-table"><thead><tr>
        <th>Title</th><th>Client</th><th>Type</th><th>Progress</th><th>Status</th><th>Deadline</th>
      </tr></thead><tbody>
        ${cases.map(c => `<tr onclick="openCase('${c.id}')">
          <td class="case-ref">${c.title}</td>
          <td>${c.clients?.name||'—'}</td>
          <td style="font-size:11.5px;color:var(--textMut)">${c.type}</td>
          <td>${progressBar(c.progress)}</td>
          <td>${statusPill(c.status)}</td>
          <td style="font-size:11.5px;color:var(--textMut)">${fmtDate(c.deadline)}</td>
        </tr>`).join('')}
      </tbody></table>
    </div>
  `;
}

// Close modals on overlay click
document.getElementById('case-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});
document.getElementById('new-case-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

// GO
init();
</script>
</body>
</html>
